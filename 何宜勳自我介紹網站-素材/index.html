<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>何宜勳的寶可夢畫展</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            /* 背景設定：第1張圖片 */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('13381.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            color: #333;
        }

        .intro-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 15px; color: #222; border-bottom: 4px solid #ffcb05; display: inline-block; }
        p { font-size: 1.2rem; line-height: 1.8; color: #444; }

        .gallery-title {
            background: #ffcb05;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* 這裡讓圖片全部攤開，每行 3 張 */
        .art-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        .art-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .art-card:hover { transform: translateY(-10px); }

        .art-card img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #eee;
        }

        @media (max-width: 900px) { .art-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="intro-card">
        <h1>何宜勳的自我介紹網站</h1>
        <p>大家好我的名字叫做何宜勳
		<br>
		我的興趣是畫畫,
		<br>
		平常繪畫一些寶可夢裡的角色。</p>
    </div>

    <div class="gallery-title">我的寶可夢作品收藏夾)</div>

    <div class="art-grid">
        <div class="art-card"><img src="13381.jpg" alt="何宜勳本人照"></div>
        <div class="art-card"><img src="13382.jpg"></div>
        <div class="art-card"><img src="13383.jpg"></div>
        <div class="art-card"><img src="13384.jpg"></div>
        <div class="art-card"><img src="13385.jpg"></div>
        <div class="art-card"><img src="13386.jpg"></div>
        <div class="art-card"><img src="13387.jpg"></div>
        <div class="art-card"><img src="13388.jpg"></div>
        <div class="art-card"><img src="13389.jpg"></div>
        <div class="art-card"><img src="13390.jpg"></div>
    </div>

</body>
</html>
